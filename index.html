<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>BTS Electrotechnique</title>

<link rel="stylesheet" href="style.css">


</head>

<body>

<!-- Contenu principal -->
<div id="topBar">
  <!-- Partie gauche -->
  <div class="left">
    <button onclick="Sommaire()">Sommaire</button>
    <button onclick="HiScores()">High Scores</button>
  </div>

  <!-- Partie droite -->
  <div class="right">
    <input type="text" id="pseudo" placeholder="Ton pseudo">
    <button id="pseudoBTN" onclick="sauverPseudo()">OK</button>
    <p id="Connexion"> Non connecté </p>
  </div>
</div>
<div id="main">
  <iframe id="zoneSimu"></iframe>
</div>



<!-- <script src="script.js"></script>-->
<script>
window.onload = function () {
	document.getElementById("zoneSimu").src = `Sommaire.html`;
	let pseudo;
	let scores = JSON.parse(localStorage.getItem("scoresApp")) || {};
	if (scores["pseudo"]) {
		pseudo=scores["pseudo"];
		document.getElementById("Connexion").innerText =
            "Bienvenue " + pseudo +"!";	
		document.getElementById("pseudo").style.display = "none" ;	
		document.getElementById("pseudoBTN").style.display = "none";
	}
	
}

//Pour supprimer : localStorage.clear();
function Sommaire(dossier){
  document.getElementById("zoneSimu").src = `Sommaire.html`;
}

function HiScores(dossier){
  document.getElementById("zoneSimu").src = `HiScores.html`;
}

function sauverPseudo(){
  const pseudo = document.getElementById("pseudo").value;
  document.getElementById("Connexion").innerText =
            "Bienvenue " + pseudo +"!";	
  document.getElementById("pseudo").style.display = "none" ;	
  document.getElementById("pseudoBTN").style.display = "none";
  let scores = JSON.parse(localStorage.getItem("scoresApp")) || {};
    if (!scores["pseudo"]) scores["pseudo"] = pseudo;
    localStorage.setItem("scoresApp", JSON.stringify(scores));
}

</script>


</body>
</html>

// --- Récupération pseudo ---
function getPseudo(){
  let pseudo="Anonyme";
  let scores = JSON.parse(localStorage.getItem("scoresApp")) || {};
	if (scores["pseudo"]) {
		pseudo=scores["pseudo"];
	}
  return pseudo;
}

// --- High scores simulés ---
function getScores(){
  return JSON.parse(localStorage.getItem("highscores") || "[]");
}

// --- Affichage pseudo ---
document.getElementById("pseudo").innerText = getPseudo();

// --- Affichage scores ---
function afficherScores(){
  const data = getScores();

  if(data.length === 0){
    document.getElementById("scores").innerHTML = "Aucun score";
    return;
  }

  let html = "";

  data.forEach(s => {
    html += `<p><b>${s.nom}</b> : <span class="score">${s.score}</span></p>`;
  });

  document.getElementById("scores").innerHTML = html;
}

let Medal=["⚪","🥉","🥈","🥇","💎"];

function getNiveau(p){
  if(p >= 90) return 4; // platine
  if(p >= 70) return 3; // or
  if(p >= 50) return 2; // argent
  if(p >= 25) return 1; // bronze
  return 0; // novice
}

function resetData() {
    if (confirm("Voulez-vous réinitialiser votre progression ?")) {
        localStorage.clear();
        location.reload();
    }
}

function afficherBadges(){
  let html = "";

  themes.forEach(t => {

    let progression = progressionTheme(t.id); // ⚠️ à adapter à ton stockage
    let niveauIndex = getNiveau(progression);
    let niveauNom = t.niveaux[niveauIndex];

    let couleurs = ["blanc","bronze","argent","or","platine"];
    let couleur = couleurs[niveauIndex];

    let percent = Math.round(progression);

    html += `
      <div class="badge ${couleur}">
        <h4>${t.titre}</h4>
        <p>${t.scientifique} ${Medal[niveauIndex]}</p>
        <p><i>${percent}% complété</i></p>
        <p><b>${niveauNom}</b></p>
      </div>
    `;
  });

  document.getElementById("badges").innerHTML = html;
}

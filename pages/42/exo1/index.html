<script>
let score = 0;
let q1Done = false;
let q2Done = false;
let q3Done = false;
let q4Done = false;
let q5Done = false;
let q6Done = false;
let q7Done = false;


let titre_texte, enonce_texte,nomExo,theme;
let Question1,Question2,Question3,Question4,Question5,Question6,Question7;
let R1,R2,R3,R4,R5,R6,R7;
let Unite1, Unite2, Unite3,Unite4,Unite5,Unite6,Unite7;
let FbRep1, FbRep2,FbRep3,FpRep4,FpRep5,FpRep6,FpRep7;
let nbquestion;


// Paramètres physiques

let D=(Math.floor(Math.random() * 5)+5)/10; // diamètre conduite 0.5 à 0.9 m
let v=(Math.floor(Math.random() * 4)+2); // vitesse eau 2 à 5 m/s
let H=(Math.floor(Math.random() * 30)+20); // hauteur chute 20 à 50 m

let rho=1000;
let g=9.81;

// Calculs

let S=Math.PI*D*D/4;
let Q=v*S;
let Ph=rho*g*Q*H;
let PkW=Ph/1000;


window.onload = function () {
  
  // écrire $(grandeur) pour écrire un string avec la valeur de la grandeur ! ex `Réaliser le calcul \\(${a1} \\times ${b1}\\)`
  /* A MODIFIER POUR LES DIFFERENTES QUESTIONS*/
  nbquestion=7;
  theme="42";
  nomExo="exo1";
  titre_texte="Alimentation d'une turbine hydraulique";

  enonce_texte=`Une conduite alimente une turbine hydraulique. 
  Le diamètre de la conduite est de ${arrondi(D)} m et la vitesse de l'eau est de ${arrondi(v)} m/s.
  La hauteur de chute est de ${arrondi(H)} m.
  On prendra \\(\\rho = 1000\\,kg/m^3\\) et \\(g = 9.81\\,m/s^2\\).
  On donne la formule pour la puissance hydraulique \\(P_h=\\rho g Q H\\)`;


// QUESTIONS

Question1=`Calculer la section de la conduite` ;
R1=arrondi(S);
FbRep1=`On utilise \\(S=\\frac{\\pi D^2}{4}=${R1}\\,m^2\\)`;
Unite1=`\\(m^2\\)`;


Question2=`Calculer le débit volumique` ;
R2=arrondi(Q);
FbRep2=`Le débit volumique vaut \\(Q=vS=${v} \\times ${arrondi(S)}=${R2}\\,m^3/s\\)`;
Unite2=`\\(m^3/s\\)`;


Question3=`Calculer le débit volumique en L/s` ;
R3=arrondi(Q*1000);
FbRep3=`\\(Q=${R2} m^3/s = ${R3} L/s\\)`;
Unite3=`\\(L/s\\)`;


Question4=`Calculer la puissance hydraulique disponible` ;
R4=arrondi(Ph);
FbRep4=`On utilise \\(P=\\rho g Q H = ${rho} \\times ${g} \\times ${arrondi(Q)} \\times ${H} = ${R4} W\\)`;
Unite4=`\\(W\\)`;


Question5=`Exprimer cette puissance en kW` ;
R5=arrondi(PkW);
FbRep5=`\\(P=${R4} W = ${R5} kW\\)`;
Unite5=`\\(kW\\)`;


Question6=`Quelle est l'énergie fournie en 24 heures ?` ;
R6=arrondi(PkW*24);
FbRep6=`\\(E=P \\times t=${R5} \\times 24 = ${R6} kWh\\)`;
Unite6=`\\(kWh\\)`;


Question7=`Si le rendement de la turbine est de 90 %, quelle est la puissance électrique produite ?` ;
let Pe=PkW*0.9;
R7=arrondi(Pe);
FbRep7=`\\(P_e=\\eta P = 0.9 \\times ${R5} = ${R7} kW\\)`;
Unite7=`\\(kW\\)`;

    
  
  
  //Ecriture du texte
  document.getElementById("titre").innerHTML = titre_texte ;
  document.getElementById("enonce").innerHTML = enonce_texte ;
  document.getElementById("q1_texte").innerHTML = Question1 ;
  document.getElementById("unite1").innerHTML = Unite1 ;
  document.getElementById("q2_texte").innerHTML = Question2 ;
  document.getElementById("unite2").innerHTML = Unite2 ;
  document.getElementById("q3_texte").innerHTML = Question3 ;
  document.getElementById("unite3").innerHTML = Unite3 ;
  document.getElementById("q4_texte").innerHTML = Question4 ;
  document.getElementById("unite4").innerHTML = Unite4 ;
  document.getElementById("q5_texte").innerHTML = Question5 ;
  document.getElementById("unite5").innerHTML = Unite5 ;
  document.getElementById("q6_texte").innerHTML = Question6 ;
  document.getElementById("unite6").innerHTML = Unite6 ;
  document.getElementById("q7_texte").innerHTML = Question7 ;
  document.getElementById("unite7").innerHTML = Unite7 ;
  MathJax.typeset();
    
};

/* VALIDATION DES REPONSES */
function validerQ1() {
  if (q1Done) return;
  let r = document.getElementById("q1").value;
  let fb = document.getElementById("fb1");
  
  if ((r >= 0.95*R1)&&(r <= 1.05*R1)) {
    score++;
    fb.innerHTML = "✅ Bonne réponse<br>"+FbRep1;
  } else {
    fb.innerHTML = "❌ Mauvaise réponse<br>"+FbRep1;
  }
  q1Done = true;
  MathJax.typeset();
}

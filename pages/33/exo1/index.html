// Paramètres du signal

let T=(Math.floor(Math.random() * 10) + 1)/1000;
let f=1/T;
let V = 50*(Math.floor(Math.random() * 5) + 1); // amplitude

let alpha=(Math.floor(Math.random() * 9)+0.5)/10;
let alphaT=alpha*T;
let I0=(Math.floor(Math.random() * 5) + 1); //valeur moyenne de i
//let DeltaI=V*(1-alpha)*alpha*T/L;
let DeltaI=2*(Math.floor(Math.random() * 8) + 2)/10*I0;
let L=V*(1-alpha)*alpha*T/DeltaI;
let Imin=I0-DeltaI/2;
let Imax=I0+DeltaI/2;

//Paramètre de la courbe
let NomCourbe1 = "tension v(t) (V)";
let NomCourbe2 = "courant i(t) (A)";
let TitreAxeX = "Temps t (s)";
let TitreAxeY = "Amplitude";
let xmax = superarrondi(2*T); //valeur maximale sur l'axe X
let ymax1 = superarrondi(V); //valeur maximale sue l'axe Y1
let ymax2 = superarrondi(Imax);; //valeur maximale sue l'axe Y2

function fonction1(t){
	let vc;
	if(t%T<alphaT){vc=V;}
	else vc=0;
   return vc;
}

function fonction2(t){
   let ic;
   let tau=t%T;
	if(tau<alphaT){ic=Imin+V*(1-alpha)*tau/L;}
	else ic=Imax-alpha*V/L*(tau-alphaT);
   return ic;
}

window.onload = function () {
  
  // écrire $(grandeur) pour écrire un string avec la valeur de la grandeur ! ex `Réaliser le calcul \\(${a1} \\times ${b1}\\)`

  //FbRepX : Feedback de la question

  //UnitéX : unité de la réponse
 Question1=`Déterminer la valeur maximale de la tension v`;
  R1=arrondi(V);
  FbRep1 =`On la trouve par lecture graphique \\(V_{max}=${R1} V\\)`;
  Unite1=`\\(V\\)`;
  
  Question2=`Déterminer la valeur moyenne de la tension v`;
  R2=arrondi(alpha*V);
  FbRep2 =`On utilise la méthode des aires.<br>
  1. On calcule l'aire \\(A= \\alpha T V_{max}\\) <br>
  2. On utilise la formule \\(V_{moy}=\\frac{A}{T}=\\alpha V_{max}=${R2} V\\)`;
  Unite2=`\\(V\\)`;
  
  Question3=`Déterminer la valeur maximale du courant` ;
  R3=arrondi(Imax);
  FbRep3 =`On mesure sur la courbe la valeur du maximum pour le courant (à \\(t=\\alpha T\\)) et on trouve \\(I_{max}=${R3} A\\)`;
  Unite3=`\\(A\\)`;
  
  Question4=`Déterminer la valeur de l'ondulation de courant \\(\\Delta I\\)` ;
  R4=arrondi(DeltaI);
  FbRep4 =`On mesure \\(I_{max}\\) et \\(I_{min}\\) et on fait \\(\\Delta I=I_{max}-I_{min}=${R4} A\\)`;
  Unite4=`\\(A\\)`;
  
  Question5=`Déterminer la période du signal` ;
  R5=arrondi(T);
  FbRep5 =`On mesure la durée d'une période du signal \\(T=${R5} s\\)`;
  Unite5=`\\(s\\)`;
  
  Question6=`Déterminer la valeur moyenne du courant` ;
  R6=arrondi(I0);
  FbRep6 =`On utilise la méthode des aires.<br>
  1. On calcule l'aire, pour ce faire on découpe l'aire en un rectangle et un triangle \\(A= T \\times I_{min} + \\frac{(I_{max}-I_{min}) T}{2}=\\frac{(I_{max}-I_{min})T}{2}\\) <br>
  2. On utilise la formule \\(I_{moy}=\\frac{A}{T}=\\frac{I_{max}+I_{min}}{2}=${R6} A\\)`;
  Unite6=`\\(A\\)`;
  
  Question7=`Déterminer la puissance fournie par le hacheur` ;
  R7=arrondi(I0*alpha*V);
  FbRep7 =`Pour calculer une puissance en continue \\(P=V_{moy}I_{moy}=${R7} W\\)`;
  Unite7=`\\(W\\)`;
    
  
  
  //Ecriture du texte
  document.getElementById("titre").innerHTML = titre_texte ;
  document.getElementById("enonce").innerHTML = enonce_texte ;

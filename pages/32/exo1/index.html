0, 0, 0, 0, 0
];


for(let i=2;i<harmonics.length;i++){

	else{harmonics[i]=0;}
}

let I1=Math.floor(Math.random() * 100)*Math.pow(10,Math.floor(Math.random() * 3)-2);

let THD=THDCalc(harmonics);

window.onload = function () {
  
  // écrire $(grandeur) pour écrire un string avec la valeur de la grandeur ! ex `Réaliser le calcul \\(${a1} \\times ${b1}\\)`

  // Ecriture des questions 
  //QuestionX : énoncé de la question
  //FbRepX : Feedback de la question
  //RX : réponse de la question
  //UnitéX : unité de la réponse
  
  Question1=`Déterminer la valeur efficace du fondamental du courant`;
  R1=arrondi(I1);
  FbRep1 =`C'est le courant indiqué en face de A-h01 \\(I_1=${R1} A\\)`;
  Unite1=`\\(A\\)`;
  
  Question2=`Déterminer la valeur maximale du fondamental du courant`;
  R2=arrondi(Math.sqrt(2)*I1);
  FbRep2 =`\\(I_{1max}=\\sqrt{2} I_1=${R2} A\\)`;
  Unite2=`\\(A\\)`;
  
  Question3=`Déterminer le rang de l'harmonique le plus important` ;
  R3=top3(harmonics)[0];
  FbRep3 =`On regarde sur l'écran l'harmonique le plus important et on regarde son rang (abscisse du spectre) n=${R3}`;
  Unite3=`\\(\\)`;
  
  Question4=`Déterminer la valeur efficace de l'harmonique le plus important` ;
  R4=arrondi(I1/100*harmonics[top3(harmonics)[0]]);
  FbRep4 =`On regarde sur l'écran l'harmonique le plus important et on fait un produit en croix avec \\(I_1\\) : \\(I_{${R3}}=${R4} A\\)`;
  Unite4=`\\(A\\)`;
  
  Question5=`Déterminer la fréquence de l'harmonique de courant le plus important.` ;
  R5=50*top3(harmonics)[0];
  FbRep5 =`\\(f_{${top3(harmonics)[0]}}=${top3(harmonics)[0]}*50=${R5} Hz\\)`;
  Unite5=`\\(Hz\\)`;
  
  Question6=`Déterminer le THD à partir des troix harmoniques les plus importants.` ;
  R6=arrondi(Math.sqrt(harmonics[Top3Harm[0]]*harmonics[Top3Harm[0]]+harmonics[Top3Harm[1]]*harmonics[Top3Harm[1]]+harmonics[Top3Harm[2]]*harmonics[Top3Harm[2]]));
  FbRep6 =`\\(THD=\\frac{\\sqrt{I_{${top3(harmonics)[0]}}^2+I_{${top3(harmonics)[1]}}^2+I_{${top3(harmonics)[2]}}^2}}{I_1}=${R6} \\%\\)`;
  Unite6=`\\(\\%\\)`;
  
  Question7=`Déterminer la valeur efficace du courant.` ;
  R7=arrondi(I);
  FbRep7 =`On mesure tous les harmoniques \\(I=\\sqrt{I_1^2+I_3^2+I_5^2+I_7^2+I_9^2+I_{11}^2+I_{13}^2+I_{15}^2+I_{17}^2+I_{19}^2+I_{21}^2+I_{23}^2+I_{25}^2}=${R7} A\\)`;
  Unite7=`\\(A\\)`;
    
  
  
  
  //Ecriture du texte
  document.getElementById("titre").innerHTML = titre_texte ;
  document.getElementById("enonce").innerHTML = enonce_texte ;
  document.getElementById("q1_texte").innerHTML = Question1 ;
  document.getElementById("unite1").innerHTML = Unite1 ;
  document.getElementById("q2_texte").innerHTML = Question2 ;
  document.getElementById("unite2").innerHTML = Unite2 ;
  document.getElementById("q3_texte").innerHTML = Question3 ;
  document.getElementById("unite3").innerHTML = Unite3 ;
  document.getElementById("q4_texte").innerHTML = Question4 ;
  document.getElementById("unite4").innerHTML = Unite4 ;
  document.getElementById("q5_texte").innerHTML = Question5 ;
  document.getElementById("unite5").innerHTML = Unite5 ;
  document.getElementById("q6_texte").innerHTML = Question6 ;
  document.getElementById("unite6").innerHTML = Unite6 ;
  document.getElementById("q7_texte").innerHTML = Question7 ;
  document.getElementById("unite7").innerHTML = Unite7 ;
  MathJax.typeset();
  
  //Trace du spectre
  SpectreHarmoniques("graph");
};

/* VALIDATION DES REPONSES */
function validerQ1() {
  if (q1Done) return;
  let r = document.getElementById("q1").value;
  let fb = document.getElementById("fb1");
  
  if ((Math.abs(r - R1) <= 0.05 * Math.abs(R1))) {
    score++;
    fb.innerHTML = "✅ Bonne réponse<br>"+FbRep1;
  } else {
    fb.innerHTML = "❌ Mauvaise réponse<br>"+FbRep1;
  }
  q1Done = true;
  MathJax.typeset();
}

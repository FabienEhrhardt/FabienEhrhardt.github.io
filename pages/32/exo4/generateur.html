<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Convertisseur Harmoniques</title>

<style>
    body{
        font-family: Arial, sans-serif;
        margin:20px;
        background:#f5f5f5;
    }

    textarea{
        width:100%;
        height:350px;
        font-family: monospace;
        padding:10px;
        font-size:14px;
    }

    button{
        margin-top:15px;
        padding:10px 20px;
        font-size:16px;
        cursor:pointer;
    }

    .result{
        margin-top:20px;
        background:white;
        padding:15px;
        border-radius:8px;
        font-family: monospace;
        word-wrap: break-word;
    }
</style>
</head>

<body>

<h2>Convertisseur Harmoniques</h2>

<textarea id="inputData" placeholder="Collez ici les données..."></textarea>

<br>

<button onclick="convertir()">Convertir</button>

<div class="result" id="resultat"></div>

<script>

function objetVersTexte(obj,titre){
    return titre+' : [' +
        Object.entries(obj)
            .map(([cle,valeur]) => `${valeur}`)
            .join(" , ")
        + " ],";
}

function convertir(){

    let texte = document.getElementById("inputData").value;
	
// Remplace tous les "- - -" par 0
texte = texte.replace(/- - -/g, "0");

    const lignes = texte.split("\n");

    let amplitudes = {};
    let phases = {};

    let rang = 0;

    for(let ligne of lignes){

        ligne = ligne.trim();

        let colonnes = ligne.split(/\s+/);

        if(colonnes.length < 3){
            continue;
        }

        let pourcentage = parseFloat(
            colonnes[0].replace(",", ".")
        );

        let phase = colonnes[2];

        if(phase.includes("- - -")){
            phase = 0;
        }

        phase = parseFloat(
            phase.replace(",", ".")
        );

        amplitudes[rang] = pourcentage;
        phases[rang] = phase;

        rang++;

        if(rang > 51){
            break;
        }
    }

    const texteAmp = objetVersTexte(amplitudes, "Harm");
    const textePhase = objetVersTexte(phases, "Phase" );

    document.getElementById("resultat").innerHTML ="{<br>"+texteAmp + "<br>" + textePhase +"<br> phif : <br>},";
}

</script>

</body>
</html>

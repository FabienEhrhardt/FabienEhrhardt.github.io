        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --success: #27ae60;
            --danger: #e74c3c;
            --card-bg: #ffffff;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; margin: 0; padding: 0; color: #333; }
        
        /* Barre d'outils supérieure */
        .admin-bar {
            background: var(--primary);
            color: white;
            padding: 10px 20px;
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .admin-bar input[type="file"] { font-size: 0.8em; }
        
        .btn {
            padding: 8px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-save { background: var(--success); color: white; margin-left: auto; }
        .btn-save:hover { background: #219150; }

        /* Conteneur principal */
        #app-container { max-width: 900px; margin: 40px auto; padding: 0 20px; }

        /* Écran de recherche */
        #search-screen {
            background: white;
            padding: 50px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
        }

        .search-group { margin: 30px 0; display: flex; justify-content: center; gap: 10px; }
        
        .input-num {
            width: 120px;
            padding: 12px;
            font-size: 1.5em;
            text-align: center;
            border: 2px solid #ddd;
            border-radius: 8px;
        }

        .btn-search { background: var(--accent); color: white; font-size: 1.2em; padding: 0 30px; }

        /* Style de la carte de correction */
        #correction-screen {
            display: none;
            flex-direction: column;
            background: var(--card-bg);
            border: 2px solid #333;
            min-height: 600px;
            position: relative;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
        }

        .overflow-error { background-color: #ffcccc !important; }

        .header-line {
            display: flex;
            justify-content: space-between;
            padding: 15px 25px;
            background: #eee;
            font-weight: bold;
            font-size: 1.4em;
            border-bottom: 2px solid #333;
        }

        .sub-header-line {
            display: flex;
            justify-content: space-between;
            padding: 10px 25px;
            background: #f9f9f9;
            border-bottom: 1px solid #ccc;
            align-items: center;
            font-size: 1.1em;
            color: #666;
        }
		
		.correction-titre {
			text-align: center;
            padding: 10px 25px;
            background: #f9f9f9;
            border-bottom: 1px solid #ccc;
            align-items: center;
            font-size: 1.4em;
			font-weight: bold;
        }

        .correction-body {
            padding: 40px;
            flex-grow: 1;
            font-size: 1.3em;
            line-height: 1.6;
            outline: none;
        }

        .image-zone {
            margin: 20px 40px;
            padding: 20px;
            border: 2px dashed #ccc;
            text-align: center;
            cursor: pointer;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .image-zone img { max-width: 100%; max-height: 450px; }

        .btn-back { background: #95a5a6; color: white; }

        /* Zone d'édition */
        [contenteditable="true"] { transition: background 0.2s; }
        [contenteditable="true"]:focus { background: #fffde7 !important; border-radius: 4px; }

        @media print {
            .admin-bar, .btn-back, .image-zone:empty { display: none !important; }
            body { background: white; }
            #correction-screen { border: none; box-shadow: none; width: 100%; }
        }
    </style>

<body>

<div class="admin-bar">
    <div class="timer-container">
    <div class="timer-info">
        <span id="timerText">60 s</span>
        <button class="btn btn-restart" onclick="restartTimer()">🔄 Relancer</button>
    </div>

    <div class="timer-bar">
        <div id="timerProgress"></div>
    </div>
</div>
</div>

<div id="app-container">
    
    <!-- ÉCRAN : RECHERCHE -->
    <div id="search-screen" style="display: block;">
        <h1>Correction des Exercices</h1>
        <p>Entrez le numéro de la carte pour afficher le corrigé</p>
        <div class="search-group">
            <input type="number" id="inputSearch" class="input-num" placeholder="N°">
            <button class="btn btn-search" onclick="handleSearch()">Rechercher</button>
        </div>
        <div id="search-error" style="color: var(--danger); display: none;">Aucun corrigé trouvé pour ce numéro.</div>
    </div>

    <!-- ÉCRAN : AFFICHAGE DU CORRIGÉ -->
    <div id="correction-screen" style="display: none;">
        <div class="header-line">
            <div id="card-chapitre" class="math-field" contenteditable="true">Chapitre</div>
            <div>N° <span id="card-numero">0</span></div>
        </div>
        <div class="sub-header-line">
            <div id="card-theme" class="math-field" contenteditable="true">Thème</div>
            <button class="btn btn-back" onclick="goToSearch()">⬅ Retour</button>
        </div>
		<div id="card-titre" class="correction-titre" contenteditable="true">
            Titre de la correction...
        </div>
        
        <div id="card-verso" class="correction-body math-field" contenteditable="true">
            Texte de la correction...
        </div>

        <div id="card-image-container" class="image-zone" onclick="triggerImageUpload()">
            <span style="color:#aaa;">+ Cliquer pour ajouter une image (ou coller)</span>
        </div>
    </div>

<script>
    let db = [];
    let currentCard = null;

    // --- INITIALISATION ---
    window.onload = function() {
        const rawData = document.getElementById('database-json').textContent;
		startTimer();
        try {
            db = JSON.parse(rawData);
            updateStatus();
        } catch(e) { db = []; }

        // Initialisation des champs éditables pour le LaTeX
        document.querySelectorAll('.math-field').forEach(setupMathEdition);
    };

    // --- GESTION EXCEL ---
    const excelFile = document.getElementById("excelFile");

	if (excelFile) {
	excelFile.addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = (event) => {
            const data = new Uint8Array(event.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
            
            let added = 0;
            rows.forEach(row => {
                // Règle : Garder la 1ère occurrence si le numéro existe déjà
                const exists = db.find(item => String(item.numero) === String(row.numero));
                if (!exists) {
                    db.push({
                        numero: row.numero,
                        chapitre: row.chapitre || '',
						titre: row.titre || '',
                        theme: row.theme || '',
                        verso: row.verso || '',
                        image: row.image ||''
                    });
                    added++;
                }
            });
            alert(added + " cartes ajoutées ! Pensez à sauvegarder le fichier.");
            updateStatus();
        };
        reader.readAsArrayBuffer(e.target.files[0]);
    });
	}

    // --- LOGIQUE DE RECHERCHE ---
    function handleSearch() {
        const num = document.getElementById('inputSearch').value;
        const result = db.find(c => String(c.numero) === String(num));

        if (result) {
            currentCard = result;
            document.getElementById('search-error').style.display = 'none';
            displayCard(result);
        } else {
            document.getElementById('search-error').style.display = 'block';
        }
    }

    function displayCard(card) {
        document.getElementById('search-screen').style.display = 'none';
        const screen = document.getElementById('correction-screen');
        screen.style.display = 'flex';

        // Remplissage des champs
        document.getElementById('card-numero').innerText = card.numero;
        
        const chap = document.getElementById('card-chapitre');
        chap.innerText = card.chapitre;
        chap.dataset.raw = card.chapitre;

        const theme = document.getElementById('card-theme');
        theme.innerText = card.theme;
        theme.dataset.raw = card.theme;
		
		const titre = document.getElementById('card-titre');
        titre.innerText = card.titre;
        titre.dataset.raw = card.titre;

        const verso = document.getElementById('card-verso');
        verso.innerHTML = card.verso;
        verso.dataset.raw = card.verso;

        // Image
        renderImage(card.image);

        // Rendu LaTeX initial
        MathJax.typesetPromise();
        checkOverflow();
    }

    function goToSearch() {
        document.getElementById('search-screen').style.display = 'block';
        document.getElementById('correction-screen').style.display = 'none';
        document.getElementById('inputSearch').value = '';
    }

    // --- ÉDITION LATEX INTELLIGENTE ---
    function setupMathEdition(el) {
        el.addEventListener('focus', function() {
            // On affiche le texte brut (avec les $$) pour l'édition
            this.innerText = this.dataset.raw || this.innerHTML;
        });

        el.addEventListener('blur', function() {
            const newVal = this.innerText;
            this.dataset.raw = newVal; // On stocke la version brute
            
            // Mise à jour de l'objet en mémoire
            if (currentCard) {
                if (this.id === 'card-chapitre') currentCard.chapitre = newVal;
				if (this.id === 'card-theme') currentCard.theme = newVal;
                if (this.id === 'card-titre') currentCard.titre = newVal;
                if (this.id === 'card-verso') currentCard.verso = newVal;
            }

            // Relancer le rendu LaTeX
            this.innerHTML = newVal;
            MathJax.typesetPromise([this]);
            checkOverflow();
        });
    }

    // --- GESTION DES IMAGES (UPLOAD & PASTE) ---
    function triggerImageUpload() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.onchange = e => {
            const reader = new FileReader();
            reader.onload = ev => saveImage(ev.target.result);
            reader.readAsDataURL(e.target.files[0]);
        };
        input.click();
    }

    document.addEventListener('paste', e => {
        if (document.getElementById('correction-screen').style.display === 'flex') {
            const items = (e.clipboardData || e.originalEvent.clipboardData).items;
            for (let item of items) {
                if (item.type.indexOf("image") !== -1) {
                    const reader = new FileReader();
                    reader.onload = ev => saveImage(ev.target.result);
                    reader.readAsDataURL(item.getAsFile());
                }
            }
        }
    });

    function saveImage(base64) {
        if (currentCard) {
            currentCard.image = base64;
            renderImage(base64);
            checkOverflow();
        }
    }

    function renderImage(imageRef) {
    const cont = document.getElementById('card-image-container');
    if (imageRef) {
        // Si c'est déjà du base64 (image collée manuellement), on l'utilise directement
        // Sinon c'est un nom de fichier → chemin relatif
        const src = imageRef.startsWith('data:') 
            ? imageRef 
            : `images/${imageRef}`;
        cont.innerHTML = `<img src="${src}" onerror="this.parentElement.innerHTML='<span style=color:#e74c3c>Image introuvable : ${imageRef}</span>'">`;
    } else {
        cont.innerHTML = `<span style="color:#aaa;">+ Cliquer pour ajouter une image (ou coller)</span>`;
    }
}

    // --- UTILITAIRES ---
    function updateStatus() {
		 const status = document.getElementById("db-status");
    if (status) {
        status.innerText = db.length + " carte(s) chargée(s)";
    }}

    function checkOverflow() {
        const card = document.getElementById('correction-screen');
        // Un petit délai pour laisser le rendu MathJax finir
        setTimeout(() => {
            if (card.scrollHeight > card.offsetHeight) {
                card.classList.add('overflow-error');
            } else {
                card.classList.remove('overflow-error');
            }
        }, 300);
    }

    function exportFullApp() {
        // On s'assure de revenir à l'écran recherche pour l'état initial du fichier sauvegardé
        goToSearch();
        
        // On injecte la DB actuelle dans le script JSON
        document.getElementById('database-json').textContent = JSON.stringify(db);
        
        // On génère le fichier
        const htmlContent = "<!DOCTYPE html>\n" + document.documentElement.outerHTML;
        const blob = new Blob([htmlContent], {type: 'text/html'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'corriges_sauvegardes.html';
        a.click();
    }

    // Recherche via touche Entrée
    document.getElementById('inputSearch').addEventListener('keypress', e => {
        if (e.key === 'Enter') handleSearch();
    });
	
	let timerDuration = 60;
let timeLeft = timerDuration;
let timerInterval = null;

function startTimer() {

    clearInterval(timerInterval);

    timeLeft = timerDuration;
    updateTimerDisplay();

    timerInterval = setInterval(() => {

        timeLeft--;

        updateTimerDisplay();

        if(timeLeft <= 0){
            clearInterval(timerInterval);

            document.getElementById("timerText").textContent = "Temps écoulé !";
            document.getElementById("timerProgress").style.width = "0%";
        }

    },1000);
}

function restartTimer(){
    startTimer();
}

function updateTimerDisplay(){

    const percent = (timeLeft/timerDuration)*100;

    document.getElementById("timerText").textContent = timeLeft + " s";

    const bar = document.getElementById("timerProgress");

    bar.style.width = percent + "%";

    if(timeLeft<=10){
        bar.style.background="#e74c3c";
    }
    else if(timeLeft<=20){
        bar.style.background="#f39c12";
    }
    else{
        bar.style.background="#2ecc71";
    }

}
	
	
	
</script>

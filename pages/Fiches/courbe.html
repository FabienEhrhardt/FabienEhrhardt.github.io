<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">

<style>

body{
background:#6f6f6f;
font-family:Arial;
}

canvas{
background:#dcdcdc;
border:2px solid #444;
}

</style>
</head>

<body>

<canvas id="analyseur" width="600" height="400"></canvas>

<script>

// =============================
// FONCTIONS UTILISATEUR
// =============================

function fV(t){
return 325*Math.sin(2*Math.PI*50*t);
}

function fI(t){
return 1.3*Math.sin(2*Math.PI*50*t + Math.PI/3)+0.5*Math.sin(2*Math.PI*3*50*t + Math.PI/3);
}

// =============================



const T = 0.02;
const N = 1200;

let tvals=[];
let Vvals=[];
let Ivals=[];

for(let i=0;i<N;i++){

let t=i/N*T;

tvals.push(t);
Vvals.push(fV(t));
Ivals.push(fI(t));

}

// =============================
// CALCULS
// =============================

function rms(arr){

let s=0;

for(let v of arr)
s+=v*v;

return Math.sqrt(s/arr.length);

}

let Vrms=rms(Vvals);
let Irms=rms(Ivals);

let Vmax=Math.max(...Vvals.map(v=>Math.abs(v)));
let Imax=Math.max(...Ivals.map(v=>Math.abs(v)));

let tcursor=0.005;

let V1=fV(tcursor);
let I1=fI(tcursor);

// =============================
// ZONE GRAPHIQUE
// =============================

const x0=80;
const y0=90;
const w=470;
const h=220;

// =============================
// DESSIN
// =============================

function draw(ecran){
const canvas = document.getElementById(ecran);
const ctx = canvas.getContext("2d");
const VmaxC=1.1*Vmax;
const ImaxC=1.1*Imax;

ctx.clearRect(0,0,600,400);

// fond zone graphique
ctx.fillStyle="white";
ctx.fillRect(x0,y0,w,h);

// cadre
ctx.strokeStyle="black";
ctx.lineWidth=2;
ctx.strokeRect(x0,y0,w,h);

// =============================
// GRILLE POINTILLEE
// =============================

ctx.setLineDash([3,4]);
ctx.strokeStyle="black";

ctx.beginPath();

ctx.moveTo(x0,y0+h*0.9);
ctx.lineTo(x0+w,y0+h*0.9);

ctx.moveTo(x0,y0+h*0.1);
ctx.lineTo(x0+w,y0+h*0.1);

ctx.stroke();

ctx.setLineDash([]);

// =============================
// AXE CENTRAL
// =============================

ctx.lineWidth=1.5;

ctx.beginPath();

ctx.moveTo(x0,y0+h/2);
ctx.lineTo(x0+w,y0+h/2);

ctx.stroke();

// =============================
// CURSEUR 5ms
// =============================

let xc=x0+w*(tcursor/T);

ctx.beginPath();

ctx.moveTo(xc,y0);
ctx.lineTo(xc,y0+h);

ctx.stroke();

// =============================
// COURBE TENSION
// =============================

ctx.strokeStyle="#00ff00";
ctx.lineWidth=2;

ctx.beginPath();

for(let i=0;i<N;i++){

let x=x0+w*(tvals[i]/T);
let y=y0+h/2-(Vvals[i]/VmaxC)*(h/2);

if(i==0) ctx.moveTo(x,y);
else ctx.lineTo(x,y);

}

ctx.stroke();

// =============================
// COURBE COURANT
// =============================

ctx.strokeStyle="#007700";
ctx.lineWidth=2;

ctx.beginPath();

for(let i=0;i<N;i++){

let x=x0+w*(tvals[i]/T);
let y=y0+h/2-(Ivals[i]/ImaxC)*(0.8*h/2);

if(i==0) ctx.moveTo(x,y);
else ctx.lineTo(x,y);

}

ctx.stroke();

// =============================
// TEXTE HAUT
// =============================

ctx.fillStyle="black";
ctx.font="26px Arial";

ctx.fillText(Vrms.toFixed(1)+" V",70,50);
ctx.fillText((Irms*1000).toFixed(0)+" mA",250,50);

// =============================
// ECHELLES GAUCHE
// =============================

ctx.font="16px Arial";

ctx.fillText(VmaxC.toFixed(0),40,y0+10);
ctx.fillText(ImaxC.toFixed(2),40,y0+30);

ctx.fillText("0",50,y0+h/2+5);

ctx.fillText("-"+VmaxC.toFixed(0),30,y0+h+5);
ctx.fillText("-"+ImaxC.toFixed(2),30,y0+h-15);

// =============================
// TEXTE BAS
// =============================

ctx.font="16px Arial";

ctx.fillText(
"t= "+(tcursor*1000).toFixed(1)+"ms   "+
"V1="+V1.toFixed(1)+"   "+
"A1="+(I1*1000).toFixed(0)+"m",
120,
350
);

}

draw("analyseur");

</script>

</body>
</html>

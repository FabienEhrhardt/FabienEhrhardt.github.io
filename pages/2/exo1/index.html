<script>
let score = 0;

let q2Done = false;
let q3Done = false;
let q4Done = false;
let q5Done = false;

let titre_texte, enonce_texte,nomExo,theme;
let Question1,Question2,Question3,Question4,Question5;
let R1,R2,R3,R4,R5;
let Unite1, Unite2, Unite3,Unite4,Unite5;
let FbRep1, FbRep2,FbRep3,FpRep4,FbRep5;
let nbquestion;

// Paramètre exercice

let tau=10*(Math.floor(Math.random() * 50)+1); //constante de temps
let E=10*(Math.floor(Math.random() * 50)+1); // Consigne
let K=0.5+0.5*(Math.floor(Math.random() * 10)+1); // gain statique
let Xsmax=0;
let tr5=0;
let Xsinf=K*E;
let Xs95=0.95*Xsinf;
let Xs105=1.05*Xsinf;
let stabilise=false;





let xmax = superarrondi(6*tau); //valeur maximale sur l'axe X
let NomCourbe1 = "Consigne Xc";
let NomCourbe2 = "Sortie Xs";
let TitreAxeX = "temps (s)";
let TitreAxeY = "Grandeurs";
let ymax1 = superarrondi(1.1*Math.max(E,K*E)); //valeur maximale sue l'axe Y1
let ymax2 = superarrondi(1.1*Math.max(E,K*E)); //valeur maximale sue l'axe Y2



function fonction1(t){
   // Consigne
   return E;
}

function fonction2(t){
   //Sortie asservie
   let Xs=K*E*(1-Math.exp(-t/tau));
   
	return Xs;
}


//Permet de faire un arrondi.
function superarrondi(num){
	
	return Math.ceil((num)*Math.pow(10,-Math.floor(Math.log10((num)))))/Math.pow(10,-Math.floor(Math.log10((num))));
}

function arrondi(num){
	if(num===0) return 0;
	return Math.round((num)*Math.pow(10,2-Math.floor(Math.log10((num)))))/Math.pow(10,2-Math.floor(Math.log10((num))));
}



window.onload = function () {
  
  // écrire $(grandeur) pour écrire un string avec la valeur de la grandeur ! ex `Réaliser le calcul \\(${a1} \\times ${b1}\\)`
  /* A MODIFIER POUR LES DIFFERENTES QUESTIONS*/
  nbquestion=5;
  nomExo="exo1";
  theme="2";
  //Titre de l'exercice
  titre_texte="Etude de la réponse indicielle d'un système du premier ordre";
  //Enoncé de l'exercice
  enonce_texte="A partir de la mesure de la consigne et de la sortie, déterminer les paramètres"
  
  // Ecriture des questions 
  //QuestionX : énoncé de la question
  //FbRepX : Feedback de la question
  //RX : réponse de la question
  //UnitéX : unité de la réponse
  Question1=`Déterminer la valeur de la sortie en régime permanent`;
  R1=arrondi(K*E);
  FbRep1 =`C'est la valeur lorsque la grandeur de sortie n'évolue plus \\(X_{s \\infty}=${R1}\\)`;
  Unite1=`\\(\\)`;
  
  Question2=`Calculer le gain statique`;
  R2=arrondi(K);
  FbRep2 =`On le calcule avec \\(K=\\frac{X_{s \\infty}}{X_{e \\infty}}=${R2}\\). Attention K peut avoir une unité`;
  Unite2=``;
	
  Question3=`Déterminer la constante de temps du système` ;
  R3=arrondi(tau);  
  FbRep3 = `Voir la courbe \\(\\uparrow\\). C'est le temps pour obtenir 63% de la variation \\(\\tau=${R3}s\\)`;
  Unite3=`\\(s\\)`;
  
  Question4=`Déterminer le temps de réponse à 5 % \\(t_{r5 \\%}\\)` ;
  R4=arrondi(3*tau); 
  FbRep4 =`Voir la courbe \\(\\uparrow\\). On trace les courbes à 95% et 105% de la valeur finale et on relève le temps lorsqu'on entre et on reste dans la zone +/-5% \\(tr_{5 \\%}=${R4} s\\)`;
  Unite4=`\\(s\\)`;
  
  Question5=`Déterminer le rapport entre \\(\\tau\\) et \\(t_{r 5\\%}\\)` ;
  R5=3;
  FbRep5 = `\\(t_{r 5\\%}=3 \\tau\\) donc \\(\\frac{t_{r 5\\%}}{\\tau}=3\\)`;
  Unite5=``;
 
  
  //Ecriture du texte
  document.getElementById("titre").innerHTML = titre_texte ;
  document.getElementById("enonce").innerHTML = enonce_texte ;
  document.getElementById("q1_texte").innerHTML = Question1 ;
  document.getElementById("unite1").innerHTML = Unite1 ;
  document.getElementById("q2_texte").innerHTML = Question2 ;
  document.getElementById("unite2").innerHTML = Unite2 ;
  document.getElementById("q3_texte").innerHTML = Question3 ;
  document.getElementById("unite3").innerHTML = Unite3 ;
  document.getElementById("q4_texte").innerHTML = Question4 ;
  document.getElementById("unite4").innerHTML = Unite4 ;
  document.getElementById("q5_texte").innerHTML = Question5;
  
  
  MathJax.typeset();
  
  //Trace de la Courbe
  tracerCourbe();
  
};

/* VALIDATION DES REPONSES */
function validerQ1() {
  if (q1Done) return;
  let r = document.getElementById("q1").value;
  let fb = document.getElementById("fb1");

  } else {

  }

}

function validerQ3() {
  if (q3Done) return;

  let r = document.getElementById("q3").value;

  } else {
    fb.innerHTML = "❌ Mauvaise réponse<br>"+FbRep3;
  }
  q3Done = true;
  tracerDroite(0,0.63*K*E,xmax,0.63*K*E,'pink');
  tracerDroite(tau,0,tau,ymax1,'pink');

}

function validerQ4() {
  if (q4Done) return;

  let r = document.getElementById("q4").value;
  let fb = document.getElementById("fb4");
 
  if ((r >= 0.95*R4)&&(r <= 1.05*R4)) {
    score++;
    fb.innerHTML = "✅ Bonne réponse<br>"+FbRep4;
	
  } else {
    fb.innerHTML = "❌ Mauvaise réponse<br>"+FbRep4;
  }
  q4Done = true;
  tracerDroite(0,Xs95,xmax,Xs95,'green');
  tracerDroite(0,Xs105,xmax,Xs105,'green');
  tracerDroite(3*tau,0,3*tau,ymax1,'green');
  tracerPoint(3*tau,0,'tr5%');
  MathJax.typeset();
}

function validerQ5() {
  if (q5Done) return;

  let r = document.getElementById("q5").value;

    fb.innerHTML = "✅ Bonne réponse<br>"+FbRep5;
	
  } else {

  q5Done = true;
  MathJax.typeset();
}




function envoyerScore() {

  let scorePourcent = 0;

  if (nbquestion > 0) {
    scorePourcent = arrondi((score / nbquestion) * 100);
  }

  try {
        // Fonction universelle pour trouver l'API SCORM
        function findAPI(win) {
            while (win) {
                if (win.API_1484_11) return { api: win.API_1484_11, version: '2004' };
                if (win.API) return { api: win.API, version: '1.2' };
                if (win.parent === win) break;
                win = win.parent;
            }
            return null;
        }

        let apiInfo = findAPI(window);

        if (apiInfo) {
            let api = apiInfo.api;

            if (apiInfo.version === '2004') {
                api.Initialize("");
                api.SetValue("cmi.score.raw", scorePourcent);
                api.SetValue("cmi.score.min", "0");
                api.SetValue("cmi.score.max", "100");
                api.SetValue("cmi.completion_status", "completed");
                api.Commit("");
                api.Terminate("");
            } else { // SCORM 1.2
                api.LMSInitialize("");
                api.LMSSetValue("cmi.core.score.raw", scorePourcent);
                api.LMSSetValue("cmi.core.score.min", "0");
                api.LMSSetValue("cmi.core.score.max", "100");
                api.LMSSetValue("cmi.core.lesson_status", "completed");
                api.LMSCommit("");
                api.LMSFinish("");
            }

            alert("Score envoyé à Moodle : " + scorePourcent + "%");

        } else {
            // Pas de SCORM détecté → mode local
            sauvegarderScore(theme,nomExo, scorePourcent);
            alert("Score (mode local) : " + scorePourcent + "%");
        }

  } catch (e) {

    console.log("Erreur SCORM :", e);
	sauvegarderScore(theme,nomExo, scorePourcent);
    alert("Score (hors Moodle) : " + scorePourcent + "%");

  }
}

function sauvegarderScore(theme, nomExo, scorePourcent) {
    let scores = JSON.parse(localStorage.getItem("scoresApp")) || {};
    if (!scores[theme]) scores[theme] = {};
    
    if (!scores[theme][nomExo] || scorePourcent > scores[theme][nomExo]) {
        scores[theme][nomExo] = scorePourcent;
    }
    localStorage.setItem("scoresApp", JSON.stringify(scores));
}

function tracerPoint(x,y,nom){
  const canvas = document.getElementById("graph");
  const ctx = canvas.getContext("2d");

  const W = canvas.width;
  const H = canvas.height;
  
  // Origine du repère
  const ox = 50;
  const oy = H-20;

  // Échelles
  const scaleX = (W - 80) / xmax; // pixels par seconde
  const scaleY1 = (H-40)/ymax1; // pixels par unité 1
  
  // AXES
  ctx.strokeStyle = "black";
  ctx.lineWidth = 2;
  
  let xp = ox + x * scaleX;
  let yp = oy - y * scaleY1;
  if(y<=20){y=20;}
  if(y>=H-20){y=H-20;}
  if(xp<=ox){xp=ox;}
  if(xp>=W-20){xp=W-20;}

  // croix x
  ctx.beginPath();
  ctx.moveTo(xp-5, yp+5);
  ctx.lineTo(xp+5, yp-5);
  ctx.stroke();
  // croix x
  ctx.beginPath();
  ctx.moveTo(xp+5, yp+5);
  ctx.lineTo(xp-5, yp-5);
  ctx.stroke();
  
  ctx.fillStyle = "black";
  ctx.font = "14px Arial";
  ctx.fillText(nom, xp, yp-10);
  
}



function tracerCourbe() {
  const canvas = document.getElementById("graph");
  const ctx = canvas.getContext("2d");

  const W = canvas.width;
  const H = canvas.height;
  const pas = xmax/1000;

  // Effacement
  ctx.clearRect(0, 0, W, H);

  // Origine du repère
  const ox = 50;
  const oy = H-20;

  // Échelles
  const scaleX = (W - 80) / xmax; // pixels par seconde
  const scaleY1 = (H-40)/ymax1; // pixels par unité 1
  const scaleY2 = (H-40)/ymax2; //pixels par unité 2

  /*************** GRILLE ***************/
  ctx.strokeStyle = "#ddd";
  ctx.lineWidth = 1;

  // Verticales
  for (let x = ox; x < W; x += scaleX*xmax / 4) {
    ctx.beginPath();
    ctx.moveTo(x, 20);
    ctx.lineTo(x, H - 20);
    ctx.stroke();
  }

  // Horizontales
  for (let y = 20; y < H; y += scaleY1*ymax1/5) {
    ctx.beginPath();
    ctx.moveTo(ox, y);
    ctx.lineTo(W - 20, y);
    ctx.stroke();
  }

  /*************** AXES ***************/
  ctx.strokeStyle = "black";
  ctx.lineWidth = 2;

  // Axe x
  ctx.beginPath();
  ctx.moveTo(ox, oy);
  ctx.lineTo(W - 20, oy);
  ctx.stroke();

  // Axe y
  ctx.beginPath();
  ctx.moveTo(ox, 20);
  ctx.lineTo(ox, H - 20);
  ctx.stroke();

  /*************** COURBE 1 ***************/
  ctx.strokeStyle = "blue";
  ctx.lineWidth = 2;
  ctx.beginPath();

  let first = true;

  for (let t = 0; t <= xmax; t += pas) {
    let x = ox + t * scaleX;
    let y = oy - fonction1(t) * scaleY1;
	if(y<=20){y=20;}
	if(y>=H-20){y=H-20;}

    if (first) {
      ctx.moveTo(x, y);
      first = false;
    } else {
      ctx.lineTo(x, y);
    }
  }

  ctx.stroke();
  
  /*************** COURBE 2 ***************/
  ctx.strokeStyle = "red";
  ctx.lineWidth = 2;
  ctx.beginPath();

  first = true;

  for (let t = 0; t <= xmax; t += pas) {
    let x = ox + t * scaleX;
    let y = oy -fonction2(t)* scaleY2;
	if(y<=20){y=20;}
	if(y>=H-20){y=H-20;}

    if (first) {
      ctx.moveTo(x, y);
      first = false;
    } else {
      ctx.lineTo(x, y);
    }
  }

  ctx.stroke();
  
  /*************** TITRES DES AXES ***************/
  ctx.fillStyle = "black";
  ctx.font = "14px Arial";

  // Axe x
  ctx.fillText(TitreAxeX, W / 2 - 40, H - 5);
  // courbe 1
  ctx.fillStyle = "blue";
  ctx.fillText(NomCourbe1, ox, H - 5);
  ctx.fillText(`${ymax1}`, ox, 15);
  // courbe 2
  ctx.fillStyle = "red";
  ctx.fillText(NomCourbe2, W-150, H - 5);
  ctx.fillText(`${ymax2}`, W-150, 15);
  // Axe y (rotation)
  ctx.fillStyle = "black";
  ctx.fillText(`${xmax}`, W-40, oy-5);
  
  ctx.save();
  ctx.translate(15, H / 2 + 40);
  ctx.rotate(-Math.PI / 2);
  ctx.fillText(TitreAxeY, 0, 0);
  ctx.restore();
    
}



function tracerDroite(xA,yA,xB,yB,couleur) {
  const canvas = document.getElementById("graph");
  const ctx = canvas.getContext("2d");

  const W = canvas.width;
  const H = canvas.height;
  const pas = xmax/1000;

  // Origine du repère
  const ox = 50;
  const oy = H-20;

  // Échelles
  const scaleX = (W - 80) / xmax; // pixels par seconde
  const scaleY1 = (H-40)/ymax1; // pixels par unité 1

 
  /*************** COURBE 1 ***************/
  ctx.strokeStyle = couleur;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(ox+xA*scaleX, oy-yA*scaleY1);
  ctx.lineTo(ox+xB*scaleX, oy-yB*scaleY1);
  ctx.stroke();
}

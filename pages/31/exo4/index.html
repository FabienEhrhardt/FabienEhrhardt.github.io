<script>
let score = 0;
let q1Done = false;

let q5Done = false;

let titre_texte, enonce_texte,nomExo,theme;
let Question1,Question2,Question3,Question4,Question5,Question6;
let R1,R2,R3,R4,R5,R6;
let Unite1, Unite2, Unite3,Unite4,Unite5,Unite6;
let FbRep1, FbRep2,FbRep3,FpRep4,FpRep5,FpRep6;
let nbquestion;

//Paramètre de l'exercice
let Z1=10*(Math.floor(Math.random() * 10) + 1); //valeur de Z1 en Ohm
let Z2=10*(Math.floor(Math.random() * 10) + 1); //valeur de Z2 en Ohm
let f=50; // 
let omega= 2 * Math.PI*f; // pulsation rad/s
let I=0.5*(Math.floor(Math.random() * 10) + 1); //valeur de I en mA

let alea1=(Math.floor(Math.random() * 3) + 1);
let Nom1,valeur1,V1,phi1; //valeur1 valeur du composant
switch(alea1)
   {
   case 1 :
    valeur1=Z1; 
	Nom1=`une résistance de résistance ${valeur1} \\(\\Omega\\)`;
	phi1=0;
    V1=Z1*I;	
	break;
 
   case 2 :
	valeur1=arrondi(Z1/omega*1000); 
	Nom1=`une bobine d'inductance ${valeur1} \\(mH\\)`;
	phi1=90;
    V1=Z1*I;	
	break;
   
   default :
    valeur1=arrondi(1/Z1/omega*1e6); 
	Nom1=`un condensateur de capacité ${valeur1} \\(\\mu F\\)`;
	phi1=-90;
    V1=Z1*I;	
	break;
   }

let alea2=(Math.floor(Math.random() * 3) + 1);
let Nom2,valeur2,V2,phi2; //valeur1 valeur du composant
switch(alea2)
   {
   case 1 :
    valeur2=Z2; 
	Nom2=`une résistance de résistance ${valeur2} \\(\\Omega\\)`;
	phi2=0;
    V2=Z2*I;	
	break;
 
   case 2 :
	valeur2=arrondi(Z2/omega*1000); 
	Nom2=`une bobine d'inductance ${valeur2} \\(mH\\)`;
	phi2=90;
    V2=Z2*I;	
	break;
   
   default :
    valeur2=arrondi(1/Z2/omega*1e6); 
	Nom2=`un condensateur de capacité ${valeur2} \\(\\mu F\\)`	;
	phi2=-90;
    V2=Z2*I;	
	break;
   }

let Z=Math.sqrt(Math.pow((Z1*Math.cos(phi1*3.14159/180)+Z2*Math.cos(phi2*3.14159/180)),2)+Math.pow((Z1*Math.sin(phi1*3.14159/180)+Z2*Math.sin(phi2*3.14159/180)),2)); //Impédance
let V=Z*I;
let phi =180/Math.PI*Math.atan((Z1*Math.sin(phi1*3.14159/180)+Z2*Math.sin(phi2*3.14159/180))/(Z1*Math.cos(phi1*3.14159/180)+Z2*Math.cos(phi2*3.14159/180))); //phi


let echellei = superarrondi(I/4); //Echelle pour l'axe i
let echellev = superarrondi(Math.max(V,V1,V2)/4); //Echelle pour l'axe v

window.onload = function () {
  
  // écrire $(grandeur) pour écrire un string avec la valeur de la grandeur ! ex `Réaliser le calcul \\(${a1} \\times ${b1}\\)`
  /* A MODIFIER POUR LES DIFFERENTES QUESTIONS*/
  nbquestion=6;
  theme="31";
  nomExo="exo4";
  //Titre de l'exercice
  titre_texte="Tracé du diagramme de Fresnel pour circuit avec 2 composants en série";

  enonce_texte=`On suppose avoir un circuit avec 2 composants en série.<br>
  Le composant 1 est `+Nom1+`.<br>
  Le composant 2 est `+Nom2+`.`;
  
  // Ecriture des questions 
  //QuestionX : énoncé de la question
  //FbRepX : Feedback de la question
  //RX : réponse de la question
  //UnitéX : unité de la réponse
  Question1=`Déterminer la valeur efficace de la tension sur le composant 1.`;
  R1=arrondi(V1);

  <table class="feedback-table">
<tr>
  <th>Type de composant</th>
  <th>Relation I-V</th>
</tr>
<tr>
  <td>Résistance</td>
  <td>\\(V=RI\\)</td>
</tr>
<tr>
  <td>Bobine</td>
  <td>\\(V=L \\omega I\\)</td>
</tr>
<tr>
  <td>Condensateur</td>
  <td>\\(V=\\frac{1}{C \\omega} I\\)</td>
</tr>
</table>
\\(V_1=${V1} V\\)
`;
  Unite1=`\\(V\\)`;
  
  Question2=`Déterminer la valeur efficace de la tension sur le composant 1.`;
  R2=arrondi(V2);
  FbRep2 =`C'est le même tableau !
  \\(V_2=${V2} V\\)`;
  Unite2=`\\(V\\)`;
	
  Question3=`Déterminer le déphasage entre le courant et la tension pour le composant 1.` ;
  R3=arrondi(phi1);
  FbRep3 =`
  <table class="feedback-table">
<tr>
  <th>Type de composant</th>
  <th>Déphasage \\(\\varphi\\)</th>
</tr>
<tr>
  <td>Résistance</td>
  <td>\\(\\varphi=0\\)°</td>
</tr>
<tr>
  <td>Bobine</td>
  <td>\\(\\varphi=90\\)°</td>
</tr>
<tr>
  <td>Condensateur</td>
  <td>\\(\\varphi=-90\\)°</td>
</tr>
</table>
\\(\\varphi_1=${R3}\\)°`;
  Unite3=`\\(°\\)`;
  
  Question4=`Déterminer le déphasage entre le courant et la tension pour le composant 2.` ;
  R4=arrondi(phi2);
  FbRep4 =`C'est le même tableau!
  \\(\\varphi_2=${R4}\\)°`;
  Unite4=`\\(°\\)`;
  
  Question5=`Déterminer la valeur efficace de la tension délivrée par le générateur \\(V\\).` ;
  R5=arrondi(V);
  FbRep5 =`On mesure sur le graphique \\(V\\)=${R5} V`;
  Unite5=`\\(V\\)`;
  
  Question6=`Déterminer le déphasage entre le courant et la tension délivrée par le générateur.` ;
  R6=arrondi(phi);
  FbRep6 =`On mesure sur le graphique \\(\\varphi\\)=${R6} °`;
  Unite6=`\\(°\\)`;
  
  
  //Ecriture du texte
  document.getElementById("titre").innerHTML = titre_texte ;
  document.getElementById("enonce").innerHTML = enonce_texte ;
  document.getElementById("q1_texte").innerHTML = Question1 ;
  document.getElementById("unite1").innerHTML = Unite1 ;
  document.getElementById("q2_texte").innerHTML = Question2 ;
  document.getElementById("unite2").innerHTML = Unite2 ;
  document.getElementById("q3_texte").innerHTML = Question3 ;
  document.getElementById("unite3").innerHTML = Unite3 ;
  document.getElementById("q4_texte").innerHTML = Question4 ;
  document.getElementById("unite4").innerHTML = Unite4 ;
  document.getElementById("q5_texte").innerHTML = Question5 ;
  document.getElementById("unite5").innerHTML = Unite5 ;
  document.getElementById("q6_texte").innerHTML = Question6 ;
  document.getElementById("unite6").innerHTML = Unite6 ;
  MathJax.typeset();
  
  //Trace de la Courbe
  initialisationFresnel();
  
  
};

/* VALIDATION DES REPONSES */
function validerQ1() {
  if (q1Done) return;
  let r = document.getElementById("q1").value;
  let fb = document.getElementById("fb1");
  
  if ((Math.abs(r - R1) <= 0.05 * Math.abs(R1))) {
    score++;
    fb.innerHTML = "✅ Bonne réponse<br>"+FbRep1;
  } else {
    fb.innerHTML = "❌ Mauvaise réponse<br>"+FbRep1;
  }
  q1Done = true;
  MathJax.typeset();
}

function tracerCourbe(){
  /* Tracé des vecteurs */
  let pos={x:0,y:0};  
  
  pos=tracerVecteur(0,0,V1,phi1,'V1','blue','v');
  pos=tracerVecteur(pos.x,pos.y,V2,phi2,'V2','red','v');
  pos=tracerVecteur(0,0,V,phi,'V','black','v');
  tracerVecteur(0,0,I,0,'I','black','i');
}

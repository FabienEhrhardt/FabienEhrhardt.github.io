<script>
let score = 0;
let q1Done = false;
let q2Done = false;
let q3Done = false;
let q4Done = false;
let q5Done = false;
let q6Done = false;
let q7Done = false;


let titre_texte, enonce_texte,nomExo,theme;
let Question1,Question2,Question3,Question4,Question5,Question6,Question7;
let R1,R2,R3,R4,R5,R6,R7;
let Unite1, Unite2, Unite3,Unite4,Unite5,Unite6,Unite7;
let FbRep1, FbRep2,FbRep3,FpRep4,FpRep5,FpRep6,FpRep7;
let nbquestion;


// Paramètres du signal

let td=(Math.floor(Math.random() * 9)+1)*10;
let tvc=(Math.floor(Math.random() * 9)+1)*30;
let ttot=2*td+tvc;
let vmax=(Math.floor(Math.random() * 130)+10);
let vmaxms=vmax/3.6; // vmax en m/s
let a=vmaxms/td; //accélération
let d1=vmaxms*td/2; //distance parcourue au démarrage
let dvc=vmaxms*tvc; //distance parcourue à vitesse constante
let dtot=2*d1+dvc; // distance totale (//même décelération)

//Paramètre de la courbe
let NomCourbe1 = "vitesse linéaire v(t) (km/h)";
let NomCourbe2 = "accélération a(t) (m/s²)";
let TitreAxeX = "Temps t (s)";
let TitreAxeY = "Amplitude";
let xmax = superarrondi(ttot); //valeur maximale sur l'axe X
let ymax1 = superarrondi(vmax); //valeur maximale sue l'axe Y1
let ymax2 = superarrondi(a);; //valeur maximale sue l'axe Y2

function fonction1(t){
	let vc;
	if(t<td){vc=vmax/td*t;}
	else if(t<td+tvc){vc=vmax}
	else if(t<2*td+tvc) {vc=vmax-vmax/td*(t-(td+tvc))}
	else vc=0;
   return vc;
}

function fonction2(t){
   let at;
	if(t<td){at=a;}
	else if(t<td+tvc){at=0;}
	else if(t<2*td+tvc) {at=-a;}
	else at=0;
   return at;
}

window.onload = function () {
  
  // écrire $(grandeur) pour écrire un string avec la valeur de la grandeur ! ex `Réaliser le calcul \\(${a1} \\times ${b1}\\)`
  /* A MODIFIER POUR LES DIFFERENTES QUESTIONS*/
  nbquestion=7;
  theme="41";
  nomExo="exo1";
  //Titre de l'exercice
  titre_texte="Profil de vitesse d'un véhicule";
  //Enoncé de l'exercice
  enonce_texte="A partir de la courbe, déterminer les paramètres"
  
  // Ecriture des questions 
  //QuestionX : énoncé de la question
  //FbRepX : Feedback de la question
  //RX : réponse de la question
  //UnitéX : unité de la réponse
 Question1=`Déterminer la valeur maximale de la vitesse v en km/h`;
  R1=arrondi(vmax);
  FbRep1 =`On la trouve par lecture graphique \\(V_{max}=${R1} km/h\\)`;
  Unite1=`\\(km/h\\)`;
  
  Question2=`En déduire la vitesse en m/s`;
  R2=arrondi(vmaxms);
  FbRep2 =`On convertit à l'aide de la fonction \\(V_{m/s}=\\frac{V_{km/h}}{3,6}=${R2} m/s\\)`;
  Unite2=`\\(m/s\\)`;
  
  Question3=`Déterminer l'accélération lors de la phase d'accélération` ;
  R3=arrondi(a);
  FbRep3 =`\\(a=\\frac{\\Delta V}{\\Delta t}=\\frac{V_{max}-V_0}{t_2-t_0}=${R3} m/s^{2}\\))`;
  Unite3=`\\(m/s^2\\)`;
  
  Question4=`Déterminer l'accélération sur la phase à vitesse constante` ;
  R4=arrondi(0);
  FbRep4 =`Si la vitesse est constante, l'accélération est nulle`;
  Unite4=`\\(m/s^2\\)`;
  
  Question5=`Déterminer la distance parcourue lors de la phase d'accélération` ;
  R5=arrondi(d1);
  FbRep5 =`La distance est l'intégrale de la vitesse, c'est donc l'aire de v(t) qui est un triangle. \\(d_{demarrage}=\\frac{V_{max} t_{demarrage}}{2}=${R5} m\\)`;
  Unite5=`\\(m\\)`;
  
  Question6=`Déterminer la distance parcourue lors de la phase à vitesse constante` ;
  R6=arrondi(dvc);
  FbRep6 =`On utilise la formule classique \\(d2=V \\Delta t=${vmax} \\times ${tvc}=${R6} m\\)`;
  Unite6=`\\(m\\)`;
  
  Question7=`Déterminer la vitesse moyenne sur le profil de vitesse` ;
  R7=arrondi(dtot/ttot*3.6);
  FbRep7 =`On mesure le temps total \\(t_{tot}=${ttot} s\\) <br>
  On calcule la distance totale sachant que la distance parcourue lors de la phase en décélération est la même qu'en accélération \\(d_{tot}=${dtot} m\\) <br>
  On calcule enfin la vitesse moyenne \\(v_{moy}=\\frac{d_{tot}}{t_{tot}}=${dtot/ttot} m/s= 3,6 \\times ${dtot/ttot} km/h=${R7} km/h\\)`;
  Unite7=`\\(km/h\\)`;
    
  
  
  //Ecriture du texte
  document.getElementById("titre").innerHTML = titre_texte ;
  document.getElementById("enonce").innerHTML = enonce_texte ;
  document.getElementById("q1_texte").innerHTML = Question1 ;
  document.getElementById("unite1").innerHTML = Unite1 ;
  document.getElementById("q2_texte").innerHTML = Question2 ;
  document.getElementById("unite2").innerHTML = Unite2 ;
  document.getElementById("q3_texte").innerHTML = Question3 ;
  document.getElementById("unite3").innerHTML = Unite3 ;
  document.getElementById("q4_texte").innerHTML = Question4 ;
  document.getElementById("unite4").innerHTML = Unite4 ;
  document.getElementById("q5_texte").innerHTML = Question5 ;
  document.getElementById("unite5").innerHTML = Unite5 ;
  document.getElementById("q6_texte").innerHTML = Question6 ;
  document.getElementById("unite6").innerHTML = Unite6 ;
  document.getElementById("q7_texte").innerHTML = Question7 ;
  document.getElementById("unite7").innerHTML = Unite7 ;
  MathJax.typeset();
  
  //Trace de la Courbe
  tracerEcran("graph");
  tracerCourbe("graph", fonction1, NomCourbe1, ymax1, "blue", 1 );
  
  
};

/* VALIDATION DES REPONSES */
function validerQ1() {
  if (q1Done) return;

  }

}
